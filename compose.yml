services:
  db:
    container_name: lootopia_bdd
    build:
      context: .
      dockerfile: apps/db/Dockerfile
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - lootopia-data:/var/lib/postgresql/data
    networks:
      - lootopia-network
    restart: unless-stopped

  api:
    container_name: lootopia_api
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - lootopia-network
    command: sh -c "npm run db:dev && cd apps/api && npm run start"
    restart: unless-stopped

  web:
    container_name: lootopia_web
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:8000
    ports:
      - "3000:3000"
    environment:
      - API_URL=http://api:8000
      - HOSTNAME=0.0.0.0
      - PORT=3000
    depends_on:
      - api
    networks:
      - lootopia-network
    restart: unless-stopped

  pwa:
    container_name: lootopia_pwa
    build:
      context: .
      dockerfile: apps/pwa/Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=/api
        - API_URL=http://api:8000
    ports:
      - "3001:3001"
    environment:
      - API_URL=http://api:8000
      - HOSTNAME=0.0.0.0
      - PORT=3001
    depends_on:
      - api
    networks:
      - lootopia-network
    restart: unless-stopped

  pgadmin:
    container_name: lootopia_pgadmin
    image: dpage/pgadmin4
    ports:
      - "5050:80"
    environment:
      - PGADMIN_DEFAULT_EMAIL=${PGADMIN_DEFAULT_EMAIL:-lootopia@lootopia.com}
      - PGADMIN_DEFAULT_PASSWORD=${PGADMIN_DEFAULT_PASSWORD:-lootopia}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - lootopia-network
    restart: unless-stopped

networks:
  lootopia-network:
    driver: bridge

volumes:
  lootopia-data:
    driver: local
