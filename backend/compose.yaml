services:
  nextjs:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - 3000:3000
    environment:
      - NODE_ENV=production
    networks:
      - lootopia-network
  db:
    image: postgres:18-alpine
    ports:
      - 5432:5432
    env_file:
      - .env
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=lootopia
    volumes:
      - ./sql:/docker-entrypoint-initdb.d
      - lootopia-data:/var/lib/postgresql/data
    networks:
      - lootopia-network

networks:
  lootopia-network:
    driver: bridge

volumes:
  lootopia-data:
    driver: local
